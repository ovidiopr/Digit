name: Build and Package Digit

on:
  release:
    types: [published]

# Required to allow the workflow to upload files to the Release page
permissions:
  contents: write

env:
  # Update these variables for new Lazarus releases
  LAZ_VER: "4.8" 
  FPC_VER_LINUX: "3.2.2-210709"
  FPC_VER_MACOS: "3.2.4rc1a"
  FPC_VER_WINDOWS: "3.2.2"

jobs:
  build:
    name: Package on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: Digit-Debian
            pattern: "*.deb"
          - os: macos-latest
            artifact_name: Digit-macOS
            pattern: "*.dmg"
          - os: windows-latest
            artifact_name: Digit-Windows
            pattern: "*.exe"

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v5

    # ==========================================
    # 1. Native Lazarus Installation
    # ==========================================
    
    - name: Install Lazarus (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        echo "Downloading Lazarus and FPC..."
        
        BASE_URL="https://sourceforge.net/projects/lazarus/files/Lazarus%20Linux%20amd64%20DEB/Lazarus%20${LAZ_VER}"
        
        # Extract actual download URL from SourceForge redirect
        download_file() {
          local url=$1
          local output=$2
          echo "Fetching: $url"
          # Get the redirect target without following it
          local redirect_url=$(curl -s -I "$url/download" | grep -i "^location:" | cut -d' ' -f2 | tr -d '\r')
          if [ -z "$redirect_url" ]; then
            echo "Failed to get redirect URL for $output"
            return 1
          fi
          echo "Downloading from: $redirect_url"
          curl -L -o "$output" "$redirect_url" || return 1
        }
        
        download_file "${BASE_URL}/fpc-laz_${FPC_VER_LINUX}_amd64.deb" "fpc-laz_${FPC_VER_LINUX}_amd64.deb" || exit 1
        download_file "${BASE_URL}/fpc-src_${FPC_VER_LINUX}_amd64.deb" "fpc-src_${FPC_VER_LINUX}_amd64.deb" || exit 1
        download_file "${BASE_URL}/lazarus-project_${LAZ_VER}_amd64.deb" "lazarus-project_${LAZ_VER}_amd64.deb" || exit 1
        
        # Validate downloaded files are actual Debian archives
        for file in fpc-laz_${FPC_VER_LINUX}_amd64.deb fpc-src_${FPC_VER_LINUX}_amd64.deb lazarus-project_${LAZ_VER}_amd64.deb; do
          SIZE=$(stat -c%s "$file" 2>/dev/null || echo 0)
          if [ "$SIZE" -lt 5000000 ]; then
            echo "ERROR: $file is too small ($SIZE bytes)"
            file "$file" || head -c 200 "$file"
            exit 1
          fi
        done
        
        sudo apt-get update
        sudo dpkg -i fpc-laz_${FPC_VER_LINUX}_amd64.deb fpc-src_${FPC_VER_LINUX}_amd64.deb lazarus-project_${LAZ_VER}_amd64.deb
        sudo apt-get install -f -y
        
        which lazbuild || { echo "ERROR: lazbuild not found"; exit 1; }

    - name: Install Lazarus (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        $BaseUrl = "https://sourceforge.net/projects/lazarus/files/Lazarus%20Windows%2064%20bits/Lazarus%20${env:LAZ_VER}/lazarus-${env:LAZ_VER}-fpc-${env:FPC_VER_WINDOWS}-win64.exe"
        
        Write-Host "Getting download URL from SourceForge..."
        
        # Extract actual download URL from redirect
        $response = Invoke-WebRequest -Uri "${BaseUrl}/download" -MaximumRedirection 0 -ErrorAction SilentlyContinue
        $downloadUrl = $response.Headers['Location']
        
        if (-not $downloadUrl) {
          Write-Error "Failed to extract download URL from SourceForge"
          exit 1
        }
        
        Write-Host "Download URL: $downloadUrl"
        
        # Retry logic with exponential backoff
        $maxRetries = 3
        $retryCount = 0
        $downloaded = $false
        
        while (-not $downloaded -and $retryCount -lt $maxRetries) {
          try {
            $retryCount++
            Write-Host "Download attempt $retryCount of $maxRetries..."
            $ProgressPreference = 'SilentlyContinue'
            Invoke-WebRequest -Uri $downloadUrl -OutFile "lazarus-setup.exe" -ErrorAction Stop -UseBasicParsing
            $downloaded = $true
          } catch {
            if ($retryCount -lt $maxRetries) {
              Write-Host "Download failed, retrying in 15 seconds..."
              Start-Sleep -Seconds 15
            } else {
              Write-Error "Failed to download Lazarus: $_"
              exit 1
            }
          }
        }
        
        $fileSize = (Get-Item "lazarus-setup.exe").Length
        Write-Host "Downloaded file size: $fileSize bytes"
        
        # Validate PE header (MZ)
        $header = Get-Content "lazarus-setup.exe" -AsByteStream -TotalCount 2
        if ($header[0] -ne 0x4D -or $header[1] -ne 0x5A) {
          Write-Error "Downloaded file is not a valid Windows executable"
          exit 1
        }
        
        if ($fileSize -lt 100000000) {
          Write-Error "Downloaded file is too small ($fileSize bytes)"
          exit 1
        }
        
        Write-Host "Installing Lazarus..."
        $process = Start-Process -FilePath ".\lazarus-setup.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /DIR=C:\lazarus" -Wait -PassThru -NoNewWindow
        
        if ($process.ExitCode -ne 0) {
          Write-Error "Installation failed with exit code $($process.ExitCode)"
          exit $process.ExitCode
        }
        
        "C:\lazarus" >> $env:GITHUB_PATH
        Write-Host "Lazarus installation completed"

    - name: Install Lazarus (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        echo "Downloading Lazarus and FPC for macOS..."
        
        BASE_URL="https://sourceforge.net/projects/lazarus/files/Lazarus%20macOS%20aarch64/Lazarus%20${LAZ_VER}"
        FPC_DMG="fpc-${FPC_VER_MACOS}.intelarm64-macosx.dmg"
        LAZ_ZIP="lazarus-darwin-aarch64-${LAZ_VER}.zip"
        
        # Extract actual download URL from SourceForge redirect
        download_file() {
          local url=$1
          local output=$2
          echo "Fetching: $url"
          local redirect_url=$(curl -s -I "$url/download" | grep -i "^location:" | cut -d' ' -f2 | tr -d '\r')
          if [ -z "$redirect_url" ]; then
            echo "Failed to get redirect URL for $output"
            return 1
          fi
          echo "Downloading from: $redirect_url"
          curl -L -o "$output" "$redirect_url" || return 1
        }
        
        download_file "${BASE_URL}/${FPC_DMG}" "$FPC_DMG" || exit 1
        download_file "${BASE_URL}/${LAZ_ZIP}" "$LAZ_ZIP" || exit 1
        
        # Validate file sizes
        FPC_SIZE=$(stat -f%z "$FPC_DMG")
        LAZ_SIZE=$(stat -f%z "$LAZ_ZIP")
        echo "FPC DMG: $FPC_SIZE bytes | Lazarus ZIP: $LAZ_SIZE bytes"
        
        if [ "$FPC_SIZE" -lt 50000000 ] || [ "$LAZ_SIZE" -lt 100000000 ]; then
          echo "ERROR: Files too small"
          exit 1
        fi
        
        echo "Installing FPC..."
        hdiutil attach "$FPC_DMG"
        PKG_FILE=$(find /Volumes/fpc* -name "*.pkg" -type f 2>/dev/null | head -n 1)
        [ -z "$PKG_FILE" ] && { echo "No .pkg found"; exit 1; }
        sudo installer -pkg "$PKG_FILE" -target /
        hdiutil detach $(df | grep '/Volumes/fpc' | awk '{print $1}')
        
        echo "Extracting Lazarus..."
        xattr -cr "$LAZ_ZIP"
        unzip -q "$LAZ_ZIP" -d "$HOME/lazarus_install"
        
        LAZ_BIN_DIR=$(dirname $(find "$HOME/lazarus_install" -name lazbuild -type f 2>/dev/null | head -n 1))
        [ -z "$LAZ_BIN_DIR" ] && { echo "lazbuild not found"; exit 1; }
        
        echo "$LAZ_BIN_DIR" >> $GITHUB_PATH
        echo "LAZARUS_DIR=$(dirname "$LAZ_BIN_DIR")" >> $GITHUB_ENV

    # ==========================================
    # 2. Fetch dependencies via GIT
    # ==========================================
    
    - name: Clone & Register Package Dependencies
      shell: bash
      run: |
        # Store packages one directory above the workspace so they don't get compiled into artifacts
        mkdir -p ../lazarus-libs
        cd ../lazarus-libs

        # Fetch latest source directly from authors (bypassing OPM entirely)
        git clone https://github.com/bgrabitmap/bgrabitmap.git
        git clone https://github.com/bgrabitmap/bgracontrols.git
        git clone https://github.com/ovidiopr/ExtTabCtrls.git

        # Register packages with lazbuild (order matters for dependencies)
        lazbuild --lazarusdir="$LAZARUS_DIR" --add-package-link bgrabitmap/bgrabitmap/bgrabitmappack.lpk
        lazbuild --lazarusdir="$LAZARUS_DIR" --add-package-link bgracontrols/bgracontrols.lpk
        lazbuild --lazarusdir="$LAZARUS_DIR" --add-package-link ExtTabCtrls/components/exttabctrls.lpk 

    # ==========================================
    # 3. Compile and package
    # ==========================================

    - name: Compile Application
      run: lazbuild --lazarusdir="$LAZARUS_DIR" Digit.lpi

    - name: Package Debian (.deb)
      if: matrix.os == 'ubuntu-latest'
      run: make build_deb 

    - name: Package macOS (.dmg)
      if: matrix.os == 'macos-latest'
      run: make build_dmg

    - name: Setup NSIS (Windows)
      if: matrix.os == 'windows-latest'
      run: choco install nsis -y

    - name: Package Windows Installer (.exe)
      if: matrix.os == 'windows-latest'
      run: makensis windows/Digit.nsi

    # ==========================================
    # 4. Export artifacts to Release
    # ==========================================

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.pattern }}
